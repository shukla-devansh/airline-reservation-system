{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — SkyWave Airlines</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon" style="background:var(--navy);display:flex;align-items:center;justify-content:center;">✈</div>
      <div class="auth-title">Welcome back</div>
      <div class="auth-sub">Sign in to manage your bookings</div>
    </div>

    {% if form.non_field_errors %}
    <div class="alert alert-error" style="margin-bottom:1rem;">
      ❌ {{ form.non_field_errors.0 }}
    </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="form-group" style="margin-bottom:1rem;">
        <label style="font-size:0.78rem;font-weight:600;color:var(--gray-400);text-transform:uppercase;letter-spacing:0.06em;">Username</label>
        <input type="text" name="username" class="form-control" placeholder="Enter your username" autofocus required>
      </div>
      <div class="form-group" style="margin-bottom:1.5rem;">
        <label style="font-size:0.78rem;font-weight:600;color:var(--gray-400);text-transform:uppercase;letter-spacing:0.06em;">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-lg btn-full">Sign In →</button>
    </form>

    <div class="auth-link">
      Don't have an account? <a href="{% url 'register' %}">Sign up free</a>
    </div>
    <div style="text-align:center;margin-top:0.8rem;">
      <a href="{% url 'home' %}" style="font-size:0.82rem;color:var(--gray-400);text-decoration:none;">← Back to home</a>
    </div>
  </div>
</div>
</body>
</html>
